<!DOCTYPE html>
<html lang="en">
<head>
<style>
    /* Styling for the popup container */
    .invoice-popup {
        width: 600px;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        font-family: 'Segoe UI', sans-serif;
        animation: slideInUp 0.6s ease-out;
        margin: 50px auto;
        border: 1px solid #eee;
    }

    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(50px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .status-badge { background: #e8f5e9; color: #2e7d32; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
    
    .payment-section {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
        border: 1px solid #e9ecef;
    }

    .cash-app-logo {
        width: 80px;
        height: 30px;
        background: #00D64F;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        border-radius: 4px;
    }

    .support-line {
        margin-top: 25px;
        font-size: 0.85em;
        color: #666;
        text-align: center;
        border-top: 1px solid #eee;
        padding-top: 10px;
    }
</style>
</head>
<body>

<div class="invoice-popup">
    <div class="header">
        <div>
            <h2 style="margin:0;">Invoice #INV11</h2>
            <p style="color:#888; font-size: 0.9em;">Issued: 06/18/2021</p>
        </div>
        <div class="status-badge">PAID</div>
    </div>

    <div style="border-bottom: 2px solid #333; padding-bottom: 10px;">
        <strong>Item Description</strong>: Dozen Flower Pots <br>
        <strong>Total</strong>: $45.00
    </div>

    <div class="payment-section">
        <div>
            <div style="font-weight:bold;">Payment Received</div>
            <div style="font-size: 0.8em; color: #555;">03/06/2023 11:05 AM</div>
        </div>
        <div class="cash-app-logo">Cash App</div>
    </div>

    <div class="support-line">
        Questions about this invoice? Contact Support: <strong>1-800-555-0199</strong>
    </div>
</div>

</body>
</html>
